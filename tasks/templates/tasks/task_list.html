<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Задачник</title>
</head>
<body>
<h1>Задачи</h1>
{% if tasks %}
    {% for task in tasks %}
        <p>{{task.title}}</p>
    {% endfor %}
{% else %}
    <p>Пока ничего нет</p>
{% endif %}
<a href="{% url 'task_create' %}">Создать задачу</a>
</body>
</html>
